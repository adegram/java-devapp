# This workflow will build a Java project with Gradle
name: Java CI with Gradle

on:
  push:                           #Step 1 
    branches: [ main ]                 
  workflow_dispatch:    # Allows manual triggering of the workflow from the GitHub Actions tab

jobs:
  build-java:

    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout Code         #Step 2
      uses: actions/checkout@v2


    - uses: actions/setup-java@v5
      with:
        distribution: 'temurin' # Step 3
        java-version: '25'


    - name: Grant execute permission for gradlew     #Step 4 
      run: chmod +x gradlew

    - name: Setup Gradle 
      uses: gradle/actions/setup-gradle@v6

    - name: Build with Gradle
      run: ./gradlew build




      

#Phase 2
  Docker-Build-Push:
    runs-on: ubuntu-latest
    needs: build-java   

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Login to DockerHub        #Step 6
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}
      
      - name: Build and Push Docker Image         #Step 7
        uses: docker/build-push-action@v4
        with:
          context: . # Specify the build context (e.g., the directory containing the Dockerfile)
          push: true
          tags:
            ${{ secrets.DOCKER_USERNAME }}/java-app:v3.3.2      